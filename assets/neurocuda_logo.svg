<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="40" fill="url(#bg)"/>

  <!-- Circuit traces -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1" fill="none">
    <line x1="30" y1="120" x2="120" y2="120"/>
    <circle cx="120" cy="120" r="3" fill="#00d4ff"/>
    <line x1="120" y1="120" x2="120" y2="200"/>
    <circle cx="120" cy="200" r="3" fill="#00d4ff"/>
    <line x1="120" y1="200" x2="200" y2="200"/>
    <line x1="400" y1="300" x2="480" y2="300"/>
    <circle cx="400" cy="300" r="3" fill="#00d4ff"/>
    <line x1="320" y1="380" x2="400" y2="380"/>
    <circle cx="320" cy="380" r="3" fill="#00d4ff"/>
    <line x1="320" y1="300" x2="320" y2="380"/>
  </g>

  <!-- Neural nodes -->
  <g opacity="0.12">
    <circle cx="60" cy="200" r="4" fill="#7c3aed"/>
    <circle cx="60" cy="250" r="4" fill="#7c3aed"/>
    <circle cx="60" cy="300" r="4" fill="#7c3aed"/>
    <line x1="64" y1="200" x2="90" y2="220" stroke="#7c3aed" stroke-width="1"/>
    <line x1="64" y1="250" x2="90" y2="240" stroke="#7c3aed" stroke-width="1"/>
    <line x1="64" y1="300" x2="90" y2="260" stroke="#7c3aed" stroke-width="1"/>
  </g>

  <!-- Brain -->
  <g transform="translate(256, 175)" filter="url(#glow)">
    <path d="M-55,-20 C-55,-55 -30,-75 0,-75 C15,-75 25,-68 30,-60 C45,-65 55,-50 55,-20 C55,10 40,30 25,40 C35,50 40,65 35,75 C30,80 20,78 15,72 C10,85 0,88 -10,85 C-15,78 -20,80 -25,72 C-30,78 -40,80 -45,75 C-50,65 -45,50 -35,40 C-50,30 -65,10 -55,-20 Z" fill="none" stroke="url(#brain)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-40,-10 C-30,-15 -20,-10 -15,-5" fill="none" stroke="url(#brain)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M-35,10 C-25,5 -15,8 -8,3" fill="none" stroke="url(#brain)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M15,-5 C20,-10 30,-15 40,-10" fill="none" stroke="url(#brain)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M8,3 C15,8 25,5 35,10" fill="none" stroke="url(#brain)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Spike signals from brain -->
  <g filter="url(#glow)">
    <line x1="200" y1="165" x2="170" y2="135" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <circle cx="165" cy="130" r="3.5" fill="#00d4ff" opacity="0.9"/>
    <line x1="210" y1="195" x2="180" y2="220" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <circle cx="175" cy="225" r="3.5" fill="#7c3aed" opacity="0.9"/>
    <line x1="310" y1="170" x2="345" y2="138" stroke="#f472b6" stroke-width="2" opacity="0.5"/>
    <circle cx="348" cy="133" r="3.5" fill="#f472b6" opacity="0.9"/>
    <line x1="315" y1="198" x2="348" y2="222" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <circle cx="352" cy="226" r="3.5" fill="#00d4ff" opacity="0.9"/>
  </g>

  <!-- Hardware chip -->
  <g transform="translate(345, 285)" opacity="0.12">
    <rect x="-22" y="-18" width="44" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <line x1="-22" y1="-6" x2="-28" y2="-6" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="-22" y1="0" x2="-28" y2="0" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="-22" y1="6" x2="-28" y2="6" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="22" y1="-6" x2="28" y2="-6" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="22" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="22" y1="6" x2="28" y2="6" stroke="#00d4ff" stroke-width="1.5"/>
  </g>

  <!-- NEURO text -->
  <text x="256" y="340" text-anchor="middle" font-family="'Segoe UI', 'Inter', -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="8" fill="url(#textGrad)" filter="url(#glow)">
    NEURO
  </text>

  <!-- CUDA text -->
  <text x="256" y="388" text-anchor="middle" font-family="'Segoe UI', 'Inter', -apple-system, sans-serif" font-size="36" font-weight="300" letter-spacing="22" fill="#94a3b8">
    CUDA
  </text>

  <!-- Divider -->
  <line x1="120" y1="410" x2="392" y2="410" stroke="url(#textGrad)" stroke-width="1" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="256" y="440" text-anchor="middle" font-family="'Segoe UI', 'Inter', -apple-system, sans-serif" font-size="14" font-weight="400" letter-spacing="5" fill="#64748b">
    ANN → SNN COMPILER
  </text>

  <!-- Company -->
  <text x="256" y="472" text-anchor="middle" font-family="'Segoe UI', 'Inter', -apple-system, sans-serif" font-size="11" font-weight="300" letter-spacing="3" fill="#475569">
    QUANTARACORE TECHNOLOGIES
  </text>
</svg>
